version: '3.8'

services:
  app:
    build: .
    container_name: cafe-app
    ports:
      - "5173:5173"

    volumes:
      - .:/app
      - node_modules:/app/node_modules

    working_dir: /app

    command: npm run dev -- --host

    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  node_modules: